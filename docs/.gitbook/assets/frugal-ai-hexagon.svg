<svg width="760" height="466" viewBox="0 64 760 466" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hex-title">
  <title id="hex-title">The Frugal AI hexagon: three goals (Frugality, Sovereignty, Openness) and three practices (Local first, Teacher-in-the-loop, Capacity building), each practice opposite the goal it serves</title>
  <rect x="1.5" y="65.5" width="757" height="463" rx="16" fill="#f8fafc" stroke="#d3d9e1" stroke-width="1.5"/>
  <line x1="380" y1="135" x2="380" y2="435" stroke="#059669" stroke-width="2" opacity="0.35"/>
  <line x1="509.9" y1="210" x2="250.1" y2="360" stroke="#4f46e5" stroke-width="2" opacity="0.35"/>
  <line x1="250.1" y1="210" x2="509.9" y2="360" stroke="#d97706" stroke-width="2" opacity="0.35"/>
  <polygon points="380,135 509.9,210 509.9,360 380,435 250.1,360 250.1,210" fill="#eef2f7" fill-opacity="0.4" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="380" cy="285" r="64" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="380" y="281" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Frugal AI</text>
  <text x="380" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12.5" letter-spacing="0.5" fill="#64748b">goals &amp; practices</text>
  <circle cx="380" cy="135" r="12" fill="#059669" stroke="#ffffff" stroke-width="3"/>
  <circle cx="509.9" cy="210" r="12" fill="#4f46e5" stroke="#ffffff" stroke-width="3"/>
  <circle cx="250.1" cy="210" r="12" fill="#d97706" stroke="#ffffff" stroke-width="3"/>
  <circle cx="380" cy="435" r="10" fill="#ffffff" stroke="#059669" stroke-width="3.5"/>
  <circle cx="250.1" cy="360" r="10" fill="#ffffff" stroke="#4f46e5" stroke-width="3.5"/>
  <circle cx="509.9" cy="360" r="10" fill="#ffffff" stroke="#d97706" stroke-width="3.5"/>
  <text x="380" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="650" fill="#047857">Frugality</text>
  <text x="534" y="216" text-anchor="start" font-family="system-ui, sans-serif" font-size="17" font-weight="650" fill="#3730a3">Sovereignty</text>
  <text x="226" y="216" text-anchor="end" font-family="system-ui, sans-serif" font-size="17" font-weight="650" fill="#92400e">Openness</text>
  <text x="380" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="650" fill="#047857">Local first</text>
  <text x="226" y="366" text-anchor="end" font-family="system-ui, sans-serif" font-size="17" font-weight="650" fill="#3730a3">Teacher-in-the-loop</text>
  <text x="534" y="366" text-anchor="start" font-family="system-ui, sans-serif" font-size="17" font-weight="650" fill="#92400e">Capacity building</text>
  <g font-family="system-ui, sans-serif" font-size="12.5" fill="#64748b">
    <circle cx="182" cy="508" r="6" fill="#475569"/>
    <text x="194" y="512.5" text-anchor="start">Goals — what the system optimises for</text>
    <circle cx="450" cy="508" r="6" fill="#ffffff" stroke="#475569" stroke-width="2.5"/>
    <text x="462" y="512.5" text-anchor="start">Practices — what makes them real</text>
  </g>
</svg>
